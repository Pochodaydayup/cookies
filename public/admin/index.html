<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>重庆美食地图 - 内容管理</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Auto-fill the ID field when creating a new entry
    var autofillInterval = setInterval(function() {
      var idInput = document.querySelector('input[id$="-id"]');
      if (idInput && !idInput.value) {
        idInput.value = Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
        idInput.dispatchEvent(new Event('change', { bubbles: true }));
        idInput.dispatchEvent(new Event('input', { bubbles: true }));
        idInput.readOnly = true;
        idInput.style.background = '#f5f6fa';
      }
    }, 1000);

    // Replace the default login button with our redirect OAuth link
    var overrideInterval = setInterval(function() {
      var loginBtn = document.querySelector('button');
      if (loginBtn && loginBtn.textContent.indexOf('GitHub') !== -1) {
        clearInterval(overrideInterval);
        var a = document.createElement('a');
        a.href = '/api/auth/login';
        a.textContent = loginBtn.textContent;
        a.style.cssText = 'display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#1A1B2E;color:#fff;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;';
        loginBtn.parentNode.replaceChild(a, loginBtn);
      }
    }, 300);
  </script>
</body>
</html>
