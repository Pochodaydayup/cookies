<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>重庆美食地图 - 内容管理</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'Pochodaydayup/cookies',
          branch: 'main'
        },
        media_folder: 'public/images',
        public_folder: '/images',
        collections: [{
          name: 'shops',
          label: '店铺',
          folder: 'public/data',
          create: true,
          extension: 'json',
          format: 'json',
          slug: '{{id}}',
          fields: [
            { label: '店铺ID', name: 'id', widget: 'string', default: '' },
            { label: '店名', name: 'name', widget: 'string' },
            { label: '分类', name: 'category', widget: 'select', options: [
              { label: '火锅', value: 'hotpot' },
              { label: '小面', value: 'noodles' },
              { label: '串串', value: 'chuanchuan' },
              { label: '烧烤', value: 'bbq' },
              { label: '江湖菜', value: 'jianghu' },
              { label: '甜品/冰粉', value: 'dessert' },
              { label: '其他', value: 'other' }
            ]},
            { label: '区域', name: 'district', widget: 'select', options: [
              { label: '渝中区', value: 'yuzhong' },
              { label: '江北区', value: 'jiangbei' },
              { label: '南岸区', value: 'nanan' },
              { label: '沙坪坝区', value: 'shapinba' },
              { label: '九龙坡区', value: 'jiulongpo' },
              { label: '大渡口区', value: 'dadukou' },
              { label: '巴南区', value: 'banan' },
              { label: '渝北区', value: 'yubei' },
              { label: '北碚区', value: 'beibei' }
            ]},
            { label: '地址', name: 'address', widget: 'string' },
            { label: '一句话描述', name: 'description', widget: 'string' },
            { label: '人均消费', name: 'avgPrice', widget: 'number', value_type: 'int' },
            { label: '推荐菜品', name: 'recommendDishes', widget: 'list' },
            { label: '营业时间', name: 'businessHours', widget: 'string' },
            { label: '经度', name: 'location.lng', widget: 'number', value_type: 'float' },
            { label: '纬度', name: 'location.lat', widget: 'number', value_type: 'float' }
          ]
        }]
      }
    });

    // Auto-fill the ID field when creating a new entry
    var autofillInterval = setInterval(function() {
      var idInput = document.querySelector('input[id$="-id"]');
      if (idInput && !idInput.value) {
        idInput.value = Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
        idInput.dispatchEvent(new Event('change', { bubbles: true }));
        idInput.dispatchEvent(new Event('input', { bubbles: true }));
        idInput.readOnly = true;
        idInput.style.background = '#f5f6fa';
      }
    }, 1000);

    // Replace the default login button with our redirect OAuth link
    var overrideInterval = setInterval(function() {
      var loginBtn = document.querySelector('button');
      if (loginBtn && loginBtn.textContent.indexOf('GitHub') !== -1) {
        clearInterval(overrideInterval);
        var a = document.createElement('a');
        a.href = '/api/auth/login';
        a.textContent = loginBtn.textContent;
        a.style.cssText = 'display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#1A1B2E;color:#fff;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;';
        loginBtn.parentNode.replaceChild(a, loginBtn);
      }
    }, 300);
  </script>
</body>
</html>
